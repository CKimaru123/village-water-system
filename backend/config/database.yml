default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000
  host: <%= ENV.fetch("DB_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "Postgresql123") %>

development:
  <<: *default
  database: village_water_system_development

test:
  <<: *default
  database: village_water_system_test

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %> # Render provides this automatically. DO NOT hardcode it.
